<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Find homes in United States on Airbnb</title>
  <link rel="stylesheet" href="stylesheet.css">
  <!--Google fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">
  <!--FontAwesome Icons-->
  <script src="https://kit.fontawesome.com/369fe9d219.js" crossorigin="anonymous"></script>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
    crossorigin="anonymous"></script>
</head>

<body>
  <header>
    <nav>
      <ul class="nav-flex-container">
        <i class="fa-brands fa-airbnb"></i>
        <li class="nav-item nav-item1">airbnb</li>
        <li class="nav-item nav-item2">Become a host</li>
        <li class="nav-item nav-item3">Help</li>
        <li class="nav-item nav-item4">Sign up</li>
        <li class="nav-item nav-item5">Log in</li>
      </ul>
    </nav>
  </header>
  <section class="heading-container">
    <div class="heading-wrapper">
      <div class="search-wrapper">
        <div class="search-card">
          <div class="search-heading">
            <h2>Find places to stay on Airbnb</h2>
            <p>Discover entire homes and private rooms perfect for any trip.</p>
          </div>
          <div class="boot-input">
            <div class="row w-100">
              <input class="search location" type="text" placeholder="Anywhere">
            </div>
            <div class="row w-100">
              <input class="col search check-in mt-2" type="date" placeholder="Add Date">
              <input class="col search check-out mt-2" type="date" placeholder="Add Date">
            </div>
            <div class="row w-100">
              <input class="col search adults mt-2 mb-3" placeholder="Adults" type="number">
              <input class="col search children mt-2 mb-3" placeholder="Children" type="number">
            </div>
            <h5>AMENITIES</h5>
            <button type="button" class="btn btn-outline-dark">Hot Tub</button>
            <button type="button" class="btn btn-outline-dark">Pool</button>
            <button type="button" class="btn btn-outline-dark">WiFi</button>
            <button type="button" class="btn btn-danger btn-lg col-12 mt-3 "><i class="fa-solid fa-magnifying-glass"></i>Search</button>
          </div>
        </div>
      </div>
      <div class="background-wrapper">
        <div class="background-card">
          <img src="images/vacation-house2.jpg" alt="suburban house">
        </div>
      </div>
    </div>
  </section>
  <section class="hosting-container">
    <div class="hosting-wrapper">
      <div class="hosting-card">
        <div class="hosting-text">
          <div class="hosting-h2">
            <h2>Try hosting</h2>
          </div>
          <div class="hosting-span">
            <span>Earn up to $6,038/month by sharing your space in Chicago.</span>
          </div>
          <div class="hosting-button">
            <button type="button" class="btn btn-light">Learn more</button>
          </div>
        </div>
        <div class="hosting-image">
          <img src="images/hosting-house.jpg" alt="house at night">
        </div>
      </div>
      
    </div>
  </section>
</body>

</html>
